services:
  # ========== PostgreSQL ==========
  postgres:
    image: postgres:16-alpine
    container_name: travelblog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_password}
      POSTGRES_DB: travel_blog
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - travelblog-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    container_name: travelblog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - travelblog-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== 后端服务 ==========
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: travelblog-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - server-uploads:/app/uploads
    networks:
      - travelblog-net

  # ========== 前端服务 (Nginx) ==========
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    container_name: travelblog-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - travelblog-net

networks:
  travelblog-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  server-uploads:
